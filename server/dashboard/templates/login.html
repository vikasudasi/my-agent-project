{% extends "base.html" %}

{% block title %}Login - AI Task Manager{% endblock %}
{% block body_class %}flex items-center justify-center{% endblock %}

{% block nav %}{% endblock %}

{% block main %}
<div class="w-full max-w-sm px-4">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
        <h1 class="text-xl font-bold text-gray-900 text-center mb-6">AI Task Manager</h1>
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700" role="alert">
            {{ error }}
        </div>
        {% endif %}
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label for="login-username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="login-username" required autocomplete="username"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="login-password" required autocomplete="current-password"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
