<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<style>
.markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
.markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 0.875rem 0 0.5rem; }
.markdown-body h3 { font-size: 1.125rem; font-weight: 600; margin: 0.75rem 0 0.375rem; }
.markdown-body p { margin: 0.5rem 0; line-height: 1.6; }
.markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
.markdown-body ul { list-style-type: disc; }
.markdown-body ol { list-style-type: decimal; }
.markdown-body li { margin: 0.25rem 0; }
.markdown-body code { background: #f3f4f6; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875em; }
.markdown-body pre { background: #f3f4f6; padding: 0.75rem 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
.markdown-body pre code { background: none; padding: 0; }
.markdown-body blockquote { border-left: 3px solid #d1d5db; padding-left: 1rem; color: #6b7280; margin: 0.75rem 0; }
.markdown-body a { color: #2563eb; text-decoration: underline; }
.markdown-body table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.875rem; }
.markdown-body th, .markdown-body td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; }
.markdown-body th { background: #f9fafb; font-weight: 600; }
.markdown-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 1rem 0; }
</style>
<script>
(function () {
    if (typeof marked !== 'undefined') {
        marked.setOptions({ gfm: true, breaks: true });
    }

    window.renderMarkdownBlocks = function () {
        document.querySelectorAll('.markdown-block').forEach(function (block) {
            var source = block.querySelector('.markdown-source');
            var output = block.querySelector('.markdown-output');
            if (!source || !output) return;
            var raw = source.value || source.textContent || '';
            if (!raw.trim()) {
                output.innerHTML = '';
                return;
            }
            var html = marked.parse(raw);
            output.innerHTML = DOMPurify.sanitize(html);
        });
    };

    document.addEventListener('DOMContentLoaded', window.renderMarkdownBlocks);
})();
</script>
