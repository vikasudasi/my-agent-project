{% if pagination and pagination.pages > 1 %}
<nav class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100" aria-label="Pagination">
    <p class="text-sm text-gray-500">
        Page {{ pagination.page }} of {{ pagination.pages }}
        <span class="text-gray-400">({{ pagination.total }} total)</span>
    </p>
    <div class="flex gap-2">
        {% if pagination.page > 1 %}
        <a href="?page={{ pagination.page - 1 }}{% if page_extra %}{{ page_extra }}{% endif %}"
           class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-50">Previous</a>
        {% endif %}
        {% if pagination.page < pagination.pages %}
        <a href="?page={{ pagination.page + 1 }}{% if page_extra %}{{ page_extra }}{% endif %}"
           class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-50">Next</a>
        {% endif %}
    </div>
</nav>
{% endif %}
