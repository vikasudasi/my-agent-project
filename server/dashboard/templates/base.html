<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Task Manager{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen {% block body_class %}{% endblock %}">
    {% block nav %}{% include "includes/nav_default.html" %}{% endblock %}

    {% if flash_message %}
    <div id="flash-banner" class="hidden" data-message="{{ flash_message }}" data-type="{{ flash_type | default('success') }}"></div>
    {% endif %}

    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 max-w-sm" aria-live="polite"></div>

    {% block main %}
    <main class="{% block main_class %}max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}

    <script src="/static/js/flash.js" defer></script>
    <script src="/static/js/nav.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
