<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AI Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <a href="/admin/agents" class="text-gray-400 hover:text-gray-600">&larr; Agents</a>
                    <h1 class="text-xl font-bold text-gray-900">Admin Settings</h1>
                </div>
                <a href="/logout" class="text-sm text-red-600 hover:text-red-800">Logout</a>
            </div>
        </div>
    </nav>
    <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% if message %}
        <div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-md text-sm text-green-700">{{ message }}</div>
        {% endif %}
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-sm text-red-700">{{ error }}</div>
        {% endif %}

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-4">Change Password</h2>
            <form action="/admin/settings/password" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                    <input type="password" name="current_password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" name="new_password" required minlength="4"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" required minlength="4"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                </div>
                <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700">
                    Update Password
                </button>
            </form>
        </div>
    </main>
</body>
</html>
