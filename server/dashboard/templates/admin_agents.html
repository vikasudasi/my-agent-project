<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Management - AI Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <a href="/" class="text-gray-400 hover:text-gray-600">&larr; Dashboard</a>
                    <h1 class="text-xl font-bold text-gray-900">Agent Management</h1>
                </div>
                <div class="flex items-center gap-3">
                    <a href="/admin/settings" class="text-sm text-gray-600 hover:text-gray-800">Settings</a>
                    <a href="/logout" class="text-sm text-red-600 hover:text-red-800">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Master</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Created</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Active</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    {% for a in agents %}
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ a.name }}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">{{ a.master_name }}</td>
                        <td class="px-6 py-4 text-sm text-gray-600 capitalize">{{ a.role }}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">{{ a.created_at }}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium {% if a.active %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">
                                {{ 'Active' if a.active else 'Inactive' }}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="/admin/agents/{{ a.id }}" class="text-sm text-blue-600 hover:text-blue-800">Manage</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if not agents %}
            <p class="text-sm text-gray-400 text-center py-8">No agents registered yet.</p>
            {% endif %}
        </div>
    </main>
</body>
</html>
