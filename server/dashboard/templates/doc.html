<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <a href="/projects/{{ project_id }}" class="text-gray-400 hover:text-gray-600">&larr; Back</a>
                    <h1 class="text-xl font-bold text-gray-900 truncate">{{ title }}</h1>
                </div>
                <span class="text-sm text-gray-500 capitalize">{{ entity_type }} documentation</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <form action="/{{ entity_type }}s/{{ entity_id }}/doc" method="POST">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Documentation (Markdown)
                    </label>
                    <textarea name="content" rows="20"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              placeholder="Write markdown documentation here...">{{ content }}</textarea>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit"
                            class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors">
                        Save Documentation
                    </button>
                    <a href="/projects/{{ project_id }}"
                       class="text-sm text-gray-600 hover:text-gray-800">
                        Cancel
                    </a>
                </div>
            </form>
        </div>

        {% if content %}
            <div class="mt-6 bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <h2 class="text-sm font-medium text-gray-700 mb-3">Preview</h2>
                <div class="prose prose-sm max-w-none text-gray-700">
                    <pre class="whitespace-pre-wrap text-sm bg-gray-50 p-4 rounded-lg border">{{ content }}</pre>
                </div>
            </div>
        {% endif %}
    </main>
</body>
</html>
